experiment_id: EXP2
result_name: exp2_eq32_nanogpt_smoke
name: NanoGPT Eq. 32 validation smoke
description: Small smoke run for the Shakespeare/NanoGPT Eq. 32 validation variant.
seed: 42
deterministic: true
device: cpu
results_root: src/scripts/exp6/results
dataset:
  name: shakespeare
  train_path: src/data/shakespeare_train.pt
  val_path: src/data/shakespeare_val.pt
  sample_size: 512
  val_size: 256
  full_batch_size: 128
model:
  type: nanogpt
  meta_path: src/data/shakespeare_meta.pt
  n_embd: 8
  n_head: 1
  n_layer: 1
  mlp_ratio: 1
training:
  batch_size: 64
  replacement: true
  lr: 0.01
  reference_steps: 0
  checkpoint_path: src/scripts/exp2/exp_results/setup2/initial_after_sgd_and_gd.pt
ensemble:
  n_runs: 4
  steps: 30
  lr: 0.001
  methods:
  - sgd_replacement
analysis:
  n_directions: 8
  gradient_batches: 4
  hessian_mean_batches: 1
  hessian_noise_batches: 1
  gamma_seeds:
  - 42
  - 142

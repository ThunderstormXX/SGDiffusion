experiment_id: EXP8
result_name: exp8_diffusion_amplification_full
name: Theory-guided diffusion amplification
description: Amplify minibatch-noise components in theory-predicted high-variance
  directions and compare against random/sharp controls.
seed: 50
deterministic: true
device: cpu
results_root: src/scripts/exp6/results
dataset:
  name: mnist
  data_dir: ./data
  sample_size: 1024
  val_size: 512
  subset: first
  normalize: false
training:
  batch_size: 64
  replacement: true
  lr: 0.1
  reference_steps: 50
ensemble:
  n_runs: 12
  steps: 300
  lr: 0.12
  amplification_factor: 3.0
  methods:
  - baseline_sgd
  - amplify_theory_high_variance
  - amplify_random
  - amplify_sharp
analysis:
  n_theory_directions: 6
  n_sharp_directions: 6
  gradient_batches: 8
  eval_every: 50

experiment_id: EXP1B
result_name: exp1b_mlp386_smoke
name: MLP-386 real-model falsification smoke
description: Small MNIST/MLP-386 ensemble from an early reference point, comparing
  SGD and Langevin-like baselines.
seed: 43
deterministic: true
device: cpu
results_root: src/scripts/exp6/results
dataset:
  name: mnist
  data_dir: ./data
  sample_size: 256
  val_size: 256
  subset: first
  normalize: false
training:
  batch_size: 32
  replacement: true
  lr: 0.05
  reference_steps: 8
ensemble:
  n_runs: 5
  steps: 80
  lr: 0.03
  lr_grid:
  - 0.01
  - 0.03
  - 0.09
  langevin_substeps: 8
  langevin_coefficient_update_every: 8
  langevin_drift_mode: reference
  langevin_noise_mode: reference
  langevin_noise_batches: 4
  methods:
  - sgd_replacement
  - standard_langevin
  - modified_langevin
analysis:
  n_directions: 6
